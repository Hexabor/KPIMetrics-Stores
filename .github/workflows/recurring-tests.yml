name: Recurring Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Runs every day at 08:00 Spain time during summer time (06:00 UTC).
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Vitest suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
